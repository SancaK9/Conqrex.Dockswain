name: Pacman repo (GitHub Pages)

# Builds the binary package on each version tag and publishes a pacman repository
# to GitHub Pages, so users can install with plain `pacman -S`.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)publish, e.g. v0.7.3'
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

# don't let two publishes race on the Pages deployment
concurrency:
  group: pacman-repo-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build package + repo database (Arch container)
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          docker run --rm -v "$PWD:/work" -w /work \
            -e TAG -e GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            archlinux:latest bash /work/packaging/repo/build.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
