name: Pacman repo (GitHub Release)

# On each version tag, build the binary package and publish a pacman repository as
# a fixed 'arch-repo' release, so users install with plain pacman:
#
#   /etc/pacman.conf:
#     [dockswain]
#     SigLevel = Optional TrustAll
#     Server = https://github.com/<owner>/<repo>/releases/download/arch-repo
#   then: sudo pacman -Syu dockswain
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build, e.g. v0.7.3'
        required: true
  workflow_call:                 # invoked by release.yml after it creates the tag
    inputs:
      tag:
        description: 'Tag to build, e.g. v0.7.3'
        required: true
        type: string

permissions:
  contents: write          # create/update the arch-repo release

concurrency:
  group: pacman-repo
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build package + repo database (Arch container)
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          docker run --rm -v "$PWD:/work" -w /work \
            -e TAG -e GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            archlinux:latest bash /work/packaging/repo/build.sh

      - name: Publish to the fixed 'arch-repo' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd repo
          gh release view arch-repo >/dev/null 2>&1 || \
            gh release create arch-repo --title "Arch / pacman repository" --latest=false \
              --notes "pacman repository for CachyOS / Arch.

          Add to /etc/pacman.conf:

          [dockswain]
          SigLevel = Optional TrustAll
          Server = https://github.com/${GITHUB_REPOSITORY}/releases/download/arch-repo

          Then: sudo pacman -Syu dockswain"
          # pacman fetches <repo>.db / <repo>.files (real files); the .tar.zst pair is
          # kept so the next run can extend the db instead of rebuilding it.
          gh release upload arch-repo --clobber \
            dockswain.db dockswain.db.tar.zst \
            dockswain.files dockswain.files.tar.zst \
            ./*.pkg.tar.zst
