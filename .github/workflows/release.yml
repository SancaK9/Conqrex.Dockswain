name: Auto release on push

# Every push to main cuts a new version: bump metadata.json + the PKGBUILD, commit
# that back, create a vX.Y.Z tag, then build the pacman repo and publish to the AUR by
# calling the existing workflows. Patch bump by default; put #minor or #major in the
# push's head commit message to bump those instead. Add [skip release] to skip entirely.
#
# No PAT needed: the publish workflows are called directly (workflow_call), so we don't
# rely on the tag push triggering them (a GITHUB_TOKEN push never triggers other runs).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      level:
        description: 'Version bump level'
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write          # commit the bump, push the tag, and (in pacman-repo) the release

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.v.outputs.release }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # need the tag history to find the latest version

      - name: Compute next version, bump files, tag
        id: v
        env:
          # Passed via env (never inlined into the script) so a commit message can't inject shell.
          HEAD_MSG: ${{ github.event.head_commit.message }}
          LEVEL_INPUT: ${{ github.event.inputs.level }}
        run: |
          set -euo pipefail

          # Manual runs always release (using the chosen level); pushes honor [skip release].
          if [ -z "${LEVEL_INPUT:-}" ] && printf '%s' "$HEAD_MSG" | grep -qF '[skip release]'; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Commit asked to skip the release."; exit 0
          fi

          git fetch --tags --force
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1 || true)
          base=${latest#v}
          if [ -z "$base" ]; then
            base=$(sed -n 's/.*"Version"[[:space:]]*:[[:space:]]*"\([0-9.]*\)".*/\1/p' package/metadata.json | head -1)
          fi
          [ -n "$base" ] || base=0.0.0
          IFS=. read -r MA MI PA <<<"$base"
          MA=${MA:-0}; MI=${MI:-0}; PA=${PA:-0}

          if [ -n "${LEVEL_INPUT:-}" ]; then level="$LEVEL_INPUT"
          elif printf '%s' "$HEAD_MSG" | grep -qF '#major'; then level=major
          elif printf '%s' "$HEAD_MSG" | grep -qF '#minor'; then level=minor
          else level=patch; fi

          case "$level" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            *)     PA=$((PA+1)) ;;
          esac
          VER="${MA}.${MI}.${PA}"; TAG="v${VER}"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "${TAG} already exists; nothing to do."; exit 0
          fi

          # Bump the version in the two places it lives (the package version itself is
          # re-derived from the tag at build time, so this just keeps the sources honest).
          sed -i -E "s/(\"Version\"[[:space:]]*:[[:space:]]*\")[0-9.]+(\")/\1${VER}\2/" package/metadata.json
          sed -i -E "s/^pkgver=.*/pkgver=${VER}/" packaging/aur/PKGBUILD

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package/metadata.json packaging/aur/PKGBUILD
          git commit -m "release: ${TAG} [skip release]"
          git tag -a "$TAG" -m "$TAG"
          git push origin HEAD:main
          git push origin "$TAG"

          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"   >> "$GITHUB_OUTPUT"
          echo "Released ${TAG}."

  pacman:
    needs: bump
    if: needs.bump.outputs.release == 'true'
    uses: ./.github/workflows/pacman-repo.yml
    with:
      tag: ${{ needs.bump.outputs.tag }}
    secrets: inherit

  aur:
    needs: bump
    if: needs.bump.outputs.release == 'true'
    uses: ./.github/workflows/aur-publish.yml
    with:
      tag: ${{ needs.bump.outputs.tag }}
    secrets: inherit
