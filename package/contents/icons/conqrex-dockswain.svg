<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- container blocks (whale-deck cargo) -->
  <g filter="url(#glow)">
    <rect x="14" y="20" width="11" height="9" rx="1.6" fill="url(#g)"/>
    <rect x="27" y="20" width="11" height="9" rx="1.6" fill="url(#g)"/>
    <rect x="40" y="20" width="11" height="9" rx="1.6" fill="url(#g)"/>
    <rect x="20.5" y="9"  width="11" height="9" rx="1.6" fill="#a5b4fc"/>
    <rect x="33.5" y="9"  width="11" height="9" rx="1.6" fill="#a5b4fc"/>
  </g>

  <!-- server / hull base -->
  <rect x="10" y="33" width="44" height="9" rx="3" fill="#9aa7c7" fill-opacity="0.30"/>
  <rect x="10" y="45" width="44" height="9" rx="3" fill="#9aa7c7" fill-opacity="0.30"/>

  <!-- status LEDs on the racks -->
  <circle cx="16.5" cy="37.5" r="2.1" fill="#5eead4" filter="url(#glow)"/>
  <circle cx="16.5" cy="49.5" r="2.1" fill="#38bdf8" filter="url(#glow)"/>

  <!-- rack vents -->
  <g fill="#cbd5f5" fill-opacity="0.6">
    <rect x="44" y="36" width="6" height="2" rx="1"/>
    <rect x="44" y="48" width="6" height="2" rx="1"/>
  </g>
</svg>
